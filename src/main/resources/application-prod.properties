# Profil PROD : durcissement (ANSSI / RGPD).
# Le schéma n'est PAS modifié automatiquement : il est seulement validé.
# La création/évolution du schéma sera gérée par des migrations versionnées (Flyway) à l'étape GCP.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Pas de fuite d'informations techniques dans les logs de production.
logging.level.root=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.level.org.springframework.web=WARN

# Aucune divulgation de détails de santé en production.
management.endpoint.health.show-details=never
